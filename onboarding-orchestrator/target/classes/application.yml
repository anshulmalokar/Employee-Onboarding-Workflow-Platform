server:
  port: 8082
  shutdown: graceful

spring:
  application:
    name: onboarding-orchestrator
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      ack-mode: record
      concurrency: 4
    consumer:
      group-id: onboarding-orchestrator-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      acks: all
      retries: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

workflow:
  default-name: onboarding
  watchdog-interval-ms: 5000
  definitions:
    onboarding:
      start-step: ACCOUNT_PROVISION
      steps:
        ACCOUNT_PROVISION:
          next-steps:
            - DEVICE_ALLOCATION
          compensation-steps: []
          timeout-seconds: 20
          max-retries: 2
        DEVICE_ALLOCATION:
          next-steps:
            - ACCESS_GRANT
          compensation-steps:
            - ACCOUNT_PROVISION
          timeout-seconds: 25
          max-retries: 2
        ACCESS_GRANT:
          next-steps: []
          compensation-steps:
            - DEVICE_ALLOCATION
            - ACCOUNT_PROVISION
          timeout-seconds: 15
          max-retries: 1

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-na}]"
