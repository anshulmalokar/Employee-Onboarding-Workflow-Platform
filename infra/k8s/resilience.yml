apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: onboarding-service-pdb
  namespace: onboarding-workflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: onboarding-service
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: onboarding-orchestrator-pdb
  namespace: onboarding-workflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: onboarding-orchestrator
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onboarding-service-hpa
  namespace: onboarding-workflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onboarding-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onboarding-orchestrator-hpa
  namespace: onboarding-workflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onboarding-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
