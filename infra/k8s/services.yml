apiVersion: apps/v1
kind: Deployment
metadata:
  name: onboarding-service
  namespace: onboarding-workflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: onboarding-service
  template:
    metadata:
      labels:
        app: onboarding-service
    spec:
      containers:
        - name: onboarding-service
          image: anshulmalokar/onboarding-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: onboarding-service
  namespace: onboarding-workflow
spec:
  selector:
    app: onboarding-service
  ports:
    - port: 80
      targetPort: 8081
---
